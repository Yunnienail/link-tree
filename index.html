<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yunnie Nail | 美甲美學</title>
  
  <!-- 載入 Tailwind CSS (排版與樣式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Google 字體：新增了 Alex Brush 作為新的 Logo 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Noto+Sans+TC:wght@200;300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel (解析 JSX 代碼) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #fceceb; /* 確保載入前有個底色 */
    }
    /* 隱藏滾動條但保留滾動功能 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
  </style>
</head>
<body>
  <!-- React 渲染容器 -->
  <div id="root"></div>

  <!-- 應用程式邏輯 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- SVG 圖示元件 ---
    const MessageCircle = ({ strokeWidth = 1.5, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
    );
    const CalendarHeart = ({ strokeWidth = 1.5, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/><path d="M21 10.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6"/><path d="M21.2 15.6c-.6-.7-1.7-.7-2.4 0L17 17.5l-1.8-1.9c-.7-.7-1.8-.7-2.4 0-.7.6-.7 1.7 0 2.4l3 3.1 4.2-4.3c.7-.6.7-1.7.2-2.3Z"/></svg>
    );
    const Instagram = ({ strokeWidth = 1.5, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    );
    const ShoppingBag = ({ strokeWidth = 1.5, className = "w-6 h-6" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    );
    const MapPin = ({ strokeWidth = 2, className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
    );
    const Clock = ({ strokeWidth = 2, className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    );
    const ChevronRight = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );
    const Sparkles = ({ className = "w-3 h-3" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
    );

    function App() {
      const [isLoaded, setIsLoaded] = useState(false);

      useEffect(() => {
        // 延遲觸發進場動畫
        setTimeout(() => setIsLoaded(true), 150);
      }, []);

      // 處理跳轉邏輯：因應 iOS / Android 不同的生態系限制
      const handleExternalClick = (e, url) => {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        
        const isInAppBrowser = /Instagram|FBAV|FBAN/i.test(ua);
        const isLineBrowser = /Line/i.test(ua);
        const isAndroid = /android/i.test(ua);
        const isIOS = /iPad|iPhone|iPod/i.test(ua);

        if (isInAppBrowser || isLineBrowser) {
          if (isAndroid) {
            // Android 系統：利用 intent 協議完美跳脫。交給手機系統決定用 Chrome 還是 APP (LINE/蝦皮) 打開
            e.preventDefault(); 
            const cleanUrl = url.replace(/^https?:\/\//, '');
            // 加上 S.browser_fallback_url 確保如果跳轉失敗，還能用預設方式打開
            window.location.href = `intent://${cleanUrl}#Intent;scheme=https;S.browser_fallback_url=${encodeURIComponent(url)};end`;
          } else if (isIOS) {
            // iOS 系統：絕對「不要」用 e.preventDefault() 攔截！
            // 讓網頁自然跳轉，iOS 才能觸發 Universal Links (通用連結) 機制，自動喚醒 LINE, IG, 蝦皮 APP。
            // 註：若點擊的是沒有專屬 APP 的網站 (如 Hotcake)，Apple 限制無法強跳 Safari，會留在 IG 內建瀏覽器。
            
            // 僅針對在 LINE 瀏覽器內的情境加上參數輔助
            if (isLineBrowser && !url.includes('openExternalBrowser')) {
              e.preventDefault();
              window.location.href = url + (url.includes('?') ? '&' : '?') + 'openExternalBrowser=1';
            }
          }
        }
      };

      const links = [
        {
          title: '官方 LINE 預約 / 諮詢',
          subtitle: '@yunnie_nail',
          url: 'https://lin.ee/bqGxA8o',
          icon: <MessageCircle strokeWidth={1.5} className="w-6 h-6" />,
          primary: true,
        },
        {
          title: '線上預約系統',
          subtitle: '24小時快速預約',
          url: 'https://tw.hotcakeapp.com/g/M6A2TX',
          icon: <CalendarHeart strokeWidth={1.5} className="w-6 h-6" />,
          primary: true,
        },
        {
          title: '客製化穿戴甲專區',
          subtitle: '@y.n.nail',
          url: 'https://instagram.com/y.n.nail',
          icon: <Instagram strokeWidth={1.5} className="w-6 h-6" />,
          primary: false,
        },
        {
          title: 'Y.N Nail 蝦皮賣場',
          subtitle: '精選美甲周邊與商品',
          url: 'https://shopee.tw/df890035',
          icon: <ShoppingBag strokeWidth={1.5} className="w-6 h-6" />,
          primary: false,
        },
      ];

      const team = [
        { name: '小羽 Yunnie', role: '闆娘 / 講師', handle: '@yunnie0905', url: 'https://www.instagram.com/yunnie0905' },
        { name: 'Lin', role: '美甲師', handle: '@yulin0820_nail', url: 'https://www.instagram.com/yulin0820_nail' },
        { name: 'Zoe', role: '美甲師', handle: '@manicurist.zoe', url: 'https://www.instagram.com/manicurist.zoe' }
      ];

      // --- 獨立宣告樣式變數，避免 GitHub Pages 的 Jekyll 解析錯誤 ---
      const bgStyle = {
        background: 'linear-gradient(160deg, #fef6f7 0%, #f6b8c1 35%, #f0899b 70%, #eb687c 100%)',
        backgroundAttachment: 'fixed'
      };

      const titleStyle = { 
        fontFamily: "'Alex Brush', cursive", 
        fontSize: 'clamp(3rem, 17vw, 5.5rem)',
        textShadow: '0px 2px 15px rgba(235,104,124,0.4), 0px 4px 4px rgba(0,0,0,0.05)' 
      };

      const subtitleStyle = { 
        textShadow: '0 1px 3px rgba(0,0,0,0.15)' 
      };

      return (
        <div 
          className="min-h-screen relative py-12 px-4 flex justify-center text-gray-800 overflow-x-hidden"
          style={bgStyle}
        >
          {/* 背景水彩暈染光暈 */}
          <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
            <div className="absolute -top-10 left-[-10%] w-[120%] h-[40%] bg-white/60 blur-[60px] rounded-full"></div>
            <div className="absolute top-[30%] -right-[20%] w-[80%] h-[60%] bg-[#e35d76]/20 blur-[80px] rounded-full mix-blend-multiply"></div>
            <div className="absolute bottom-[-10%] left-[-20%] w-[90%] h-[50%] bg-[#f8b4c1]/30 blur-[100px] rounded-full mix-blend-multiply"></div>
          </div>

          <div className={`w-full max-w-md relative z-10 flex flex-col gap-8 transition-all duration-1000 ease-out ${isLoaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
            
            {/* Header 品牌視覺區塊 */}
            <header className="flex flex-col items-center text-center mt-6 w-full px-2">
              <h1 
                className="leading-none text-white tracking-normal drop-shadow-lg mb-2 whitespace-nowrap"
                style={titleStyle}
              >
                Yunnie Nail
              </h1>
              
              <p className="text-white text-[13px] tracking-[0.35em] font-light drop-shadow-md mb-8 ml-1" style={subtitleStyle}>
                凝膠美甲 · 手足保養 · 教學 · 霧眉
              </p>

              {/* 資訊卡片 */}
              <div className="bg-white/40 backdrop-blur-xl border border-white/60 shadow-[0_8px_32px_0_rgba(235,104,124,0.2)] rounded-3xl p-6 w-full text-sm relative overflow-hidden group">
                <div className="absolute top-0 left-[-100%] w-1/2 h-full bg-gradient-to-r from-transparent via-white/50 to-transparent skew-x-[-20deg] group-hover:left-[200%] transition-all duration-1000 ease-in-out"></div>
                
                <p className="mb-5 text-gray-800 font-normal leading-relaxed text-center tracking-wide">
                  歡迎來到專屬服務選單 🤍<br/>
                  提供 <span className="font-medium text-pink-700">美甲線上預約</span> · <span className="font-medium text-pink-700">穿戴甲訂製</span> · <span className="font-medium text-pink-700">商品選購</span>
                </p>
                
                <div className="flex flex-col gap-3 text-left">
                  <div className="flex items-center gap-4 bg-white/50 rounded-2xl p-3.5 border border-white/60 backdrop-blur-md transition-colors hover:bg-white/70">
                    <div className="bg-pink-100 p-2 rounded-full shadow-sm">
                      <Clock strokeWidth={2} className="w-4 h-4 text-pink-600" />
                    </div>
                    <span className="text-[13px] text-gray-800 tracking-wide font-medium">營業時間 11:00 - 20:00 <span className="text-pink-700/80 text-xs ml-1">(預約制)</span></span>
                  </div>
                  <a 
                    href="https://www.google.com/maps/search/?api=1&query=高雄市新興區民族二路97號11樓" 
                    onClick={(e) => handleExternalClick(e, "https://www.google.com/maps/search/?api=1&query=高雄市新興區民族二路97號11樓")}
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="flex items-center gap-4 bg-white/50 rounded-2xl p-3.5 border border-white/60 backdrop-blur-md transition-colors hover:bg-white/70 cursor-pointer group/map"
                  >
                    <div className="bg-pink-100 p-2 rounded-full shadow-sm group-hover/map:scale-110 transition-transform duration-300">
                      <MapPin strokeWidth={2} className="w-4 h-4 text-pink-600" />
                    </div>
                    <span className="text-[13px] text-gray-800 tracking-wide font-medium group-hover/map:text-pink-700 transition-colors duration-300">高雄市新興區民族二路97號11樓</span>
                  </a>
                </div>
              </div>
            </header>

            {/* 主要連結區塊 */}
            <main className="flex flex-col gap-4">
              {links.map((link, index) => {
                const delayStyle = { transitionDelay: `${index * 100}ms` };
                return (
                  <a
                    key={index}
                    href={link.url}
                    onClick={(e) => handleExternalClick(e, link.url)}
                    target="_blank"
                    rel="noopener noreferrer"
                    className={`group relative flex items-center p-4 rounded-3xl transition-all duration-300 transform hover:-translate-y-1.5 
                      ${link.primary 
                        ? 'bg-white/80 hover:bg-white shadow-[0_8px_20px_rgba(235,104,124,0.25)] hover:shadow-[0_12px_25px_rgba(235,104,124,0.35)] border border-white' 
                        : 'bg-white/50 hover:bg-white/80 shadow-[0_4px_15px_rgba(235,104,124,0.1)] border border-white/60 hover:border-white/90'
                      }
                      backdrop-blur-lg overflow-hidden
                    `}
                    style={delayStyle}
                  >
                    <div className={`p-3 rounded-2xl mr-4 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3
                      ${link.primary ? 'bg-pink-100 text-pink-600 shadow-inner' : 'bg-white/90 text-gray-700'}
                    `}>
                      {link.icon}
                    </div>
                    <div className="flex-1">
                      <h2 className={`font-bold text-[15px] tracking-wide ${link.primary ? 'text-gray-800' : 'text-gray-800'}`}>
                        {link.title}
                      </h2>
                      {link.subtitle && (
                        <p className={`text-xs mt-1 font-medium tracking-wider ${link.primary ? 'text-pink-600' : 'text-gray-600'}`}>
                          {link.subtitle}
                        </p>
                      )}
                    </div>
                    <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 group-hover:translate-x-1 ${link.primary ? 'bg-pink-50' : 'bg-white/70'}`}>
                      <ChevronRight className={`w-5 h-5 ${link.primary ? 'text-pink-500' : 'text-gray-500'}`} />
                    </div>
                  </a>
                );
              })}
            </main>

            {/* 團隊介紹區塊 */}
            <section className="mt-2">
              <div className="flex items-center justify-center gap-4 mb-6">
                <div className="h-[1px] bg-gradient-to-r from-transparent to-white/60 flex-1"></div>
                <Sparkles className="w-3 h-3 text-white" />
                <span className="text-white text-xs font-bold tracking-[0.2em] drop-shadow-sm">ARTIST TEAM</span>
                <Sparkles className="w-3 h-3 text-white" />
                <div className="h-[1px] bg-gradient-to-l from-transparent to-white/60 flex-1"></div>
              </div>
              
              <div className="grid grid-cols-1 gap-3">
                {team.map((member, index) => (
                  <a
                    key={index}
                    href={member.url}
                    onClick={(e) => handleExternalClick(e, member.url)}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center justify-between bg-white/40 hover:bg-white/70 backdrop-blur-md border border-white/50 hover:border-white/90 rounded-2xl p-4 transition-all duration-300 group shadow-[0_4px_15px_rgba(235,104,124,0.1)]"
                  >
                    <div className="flex items-baseline gap-3">
                      <span className="font-bold text-gray-800 text-[15px]">{member.name}</span>
                      <span className="text-xs text-pink-700 font-bold tracking-widest">{member.role}</span>
                    </div>
                    <div className="flex items-center gap-2 text-gray-700 group-hover:text-pink-600 transition-colors">
                      <span className="text-xs font-medium tracking-wider">{member.handle}</span>
                      <div className="bg-white/80 p-1.5 rounded-full group-hover:bg-pink-100 group-hover:shadow-[0_0_10px_rgba(244,114,182,0.4)] transition-all duration-300">
                        <Instagram className="w-3.5 h-3.5 text-pink-600" />
                      </div>
                    </div>
                  </a>
                ))}
              </div>
            </section>

            {/* Footer */}
            <footer className="text-center mt-4 mb-6">
              <p className="text-white/80 text-[10px] font-medium tracking-widest uppercase drop-shadow-sm">
                © {new Date().getFullYear()} Yunnie Nail All Rights Reserved.
              </p>
            </footer>

          </div>
        </div>
      );
    }

    // 啟動 React 應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
